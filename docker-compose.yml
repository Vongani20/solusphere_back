version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: solusphere_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: solusphere
      MYSQL_USER: solusphere_users
      MYSQL_PASSWORD: Caswell1234
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  app:
    build: .
    container_name: solusphere_app
    restart: always
    ports:
      - "2080:2080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - USE_AWS_SECRETS_MANAGER=false
      - USE_SECRETS_AGENT=false
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=solusphere_users
      - DB_PASSWORD=Caswell1234
      - DB_NAME=solusphere
      - GIN_MODE=release
      - PORT=2080
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./uploads:/app/uploads
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge