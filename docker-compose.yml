services:
  db:
    image: mysql:8.0
    container_name: solusphere_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: solusphere
      MYSQL_USER: solusphere_users
      MYSQL_PASSWORD: Caswell1234
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  app:
    build: .
    container_name: solusphere_app
    restart: always
    ports:
      - "2080:2080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Enable AWS Secrets Manager
      - USE_AWS_SECRETS_MANAGER=true
      - USE_SECRETS_AGENT=false
      
      # AWS Configuration
      - AWS_REGION=eu-west-1
      - AWS_SECRET_NAME=solusphere/prod
      
      # CRITICAL: Override database host for Docker
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=solusphere_users
      - DB_PASSWORD=Caswell1234
      - DB_NAME=solusphere
      
      # App Configuration
      - GIN_MODE=release
      - PORT=2080
      - UPLOAD_DIR=/app/uploads
      - AWS_SDK_LOAD_CONFIG=1
      - AWS_EC2_METADATA_DISABLED=true
      
    volumes:
      - ./uploads:/app/uploads
      - C:\Users\vmaluleke\.aws:/root/.aws:ro
    networks:
      - app-network
    # Add command to debug environment variables
    command: sh -c "echo '=== Environment Variables ===' && env | grep DB_ && ./main"

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge